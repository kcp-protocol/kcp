# Ruff configuration — KCP Project
# https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "S",    # bandit (segurança básica)
    "N",    # pep8-naming
]

ignore = [
    "S101",   # assert em testes é ok
    "S311",   # random não criptográfico ok em demos
    "B008",   # Depends() no FastAPI
    "N805",   # first arg não precisa ser self em alguns casos
    "E501",   # line too long (controlado por line-length acima)
]

# Não aplicar em testes algumas regras de segurança
[lint.per-file-ignores]
"tests/**" = ["S", "B", "N"]
"**/test_*.py" = ["S", "B", "N"]
"demo*.py" = ["S", "T201"]
"poc/**" = ["ALL"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
