# ──────────────────────────────────────────────────────────────────────────────
# /etc/nginx/kcp-locations.conf
# Incluído por TODOS os server blocks dos peers KCP.
# Define apenas as regras de rate limit, validação de header e segurança.
# O proxy_pass usa a variável $upstream definida em cada server block.
#
# Cada server block deve definir:
#   set $upstream "127.0.0.1:88XX";
# antes do include.
# ──────────────────────────────────────────────────────────────────────────────

# ── Health: sem rate limit ────────────────────────────────────────────────────
location = /kcp/v1/health {
    proxy_pass http://$upstream;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-Proto  $scheme;
}

# ── Sync: rate limit estrito + X-KCP-Client obrigatório ──────────────────────
location /kcp/v1/sync/ {
    limit_req zone=kcp_sync burst=5 nodelay;
    limit_req_status 429;

    if ($http_x_kcp_client = "") {
        return 400 '{"error":"X-KCP-Client header required for sync"}';
    }

    proxy_pass http://$upstream;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-KCP-Client       $http_x_kcp_client;
}

# ── Publish: rate limit médio ─────────────────────────────────────────────────
location = /kcp/v1/artifacts {
    limit_req zone=kcp_write burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://$upstream;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
}

# ── API geral ─────────────────────────────────────────────────────────────────
location /kcp/ {
    limit_req zone=kcp_general burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://$upstream;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
}

# ── Bloquear tudo o mais ──────────────────────────────────────────────────────
location / {
    add_header Content-Type application/json always;
    return 404 '{"error":"Not found"}';
}
