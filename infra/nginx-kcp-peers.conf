# ──────────────────────────────────────────────────────────────────────────────
# KCP Peers — nginx virtual hosts
# Cada peer tem seu próprio server block e aponta para uma instância uvicorn
# separada com dados isolados.
#
# peer04 → porta 8804 → /dados/kcp/data/peer04/
# peer05 → porta 8805 → /dados/kcp/data/peer05/
# peer07 → porta 8807 → /dados/kcp/data/peer07/
#
# Deploy: sudo cp infra/nginx-kcp-peers.conf /etc/nginx/sites-available/kcp-peers
#         sudo ln -sf /etc/nginx/sites-available/kcp-peers /etc/nginx/sites-enabled/kcp-peers
#         sudo rm /etc/nginx/sites-enabled/kcp-peer  # remove config antiga
#         sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (todos os peers) ────────────────────────────────────
server {
    listen 80;
    server_name peer04.kcp-protocol.org peer05.kcp-protocol.org peer07.kcp-protocol.org;
    return 301 https://$host$request_uri;
}

# ── Macro para blocos de proxy ────────────────────────────────────────────────
# (nginx não tem macros, mas usamos includes por peer — ver abaixo)

# ══════════════════════════════════════════════════════════════════════════════
# peer04.kcp-protocol.org → uvicorn :8804
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name peer04.kcp-protocol.org;

    ssl_certificate     /etc/letsencrypt/live/peer04.kcp-protocol.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peer04.kcp-protocol.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-KCP-Node "peer04.kcp-protocol.org";

    access_log /var/log/nginx/kcp-peer04.access.log;
    error_log  /var/log/nginx/kcp-peer04.error.log;

    set $upstream "127.0.0.1:8804";
    include /etc/nginx/kcp-locations.conf;
}

# ══════════════════════════════════════════════════════════════════════════════
# peer05.kcp-protocol.org → uvicorn :8805
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name peer05.kcp-protocol.org;

    ssl_certificate     /etc/letsencrypt/live/peer04.kcp-protocol.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peer04.kcp-protocol.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-KCP-Node "peer05.kcp-protocol.org";

    access_log /var/log/nginx/kcp-peer05.access.log;
    error_log  /var/log/nginx/kcp-peer05.error.log;

    set $upstream "127.0.0.1:8805";
    include /etc/nginx/kcp-locations.conf;
}

# ══════════════════════════════════════════════════════════════════════════════
# peer07.kcp-protocol.org → uvicorn :8807
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name peer07.kcp-protocol.org;

    ssl_certificate     /etc/letsencrypt/live/peer04.kcp-protocol.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/peer04.kcp-protocol.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-KCP-Node "peer07.kcp-protocol.org";

    access_log /var/log/nginx/kcp-peer07.access.log;
    error_log  /var/log/nginx/kcp-peer07.error.log;

    set $upstream "127.0.0.1:8807";
    include /etc/nginx/kcp-locations.conf;
}
