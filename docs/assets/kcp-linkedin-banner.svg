<svg viewBox="0 0 1200 627" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    
    <linearGradient id="layer8Gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bgGradient)" width="1200" height="627"/>
  <rect fill="url(#grid)" width="1200" height="627"/>
  
  <!-- Decorative circles (network nodes) -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="200" fill="none" stroke="#6366f1" stroke-width="1"/>
    <circle cx="1100" cy="527" r="250" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="900" cy="50" r="150" fill="none" stroke="#6366f1" stroke-width="1"/>
  </g>
  
  <!-- Layer Stack Visualization -->
  <g transform="translate(80, 180)">
    <!-- Glow behind Layer 8 -->
    <rect x="-10" y="0" width="320" height="60" rx="12" fill="url(#glowGradient)"/>
    
    <!-- Layer 8 (highlighted) -->
    <rect x="0" y="10" width="300" height="50" rx="10" fill="url(#layer8Gradient)" filter="url(#glow)"/>
    <text x="150" y="42" fill="white" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">
      Layer 8: Knowledge Context
    </text>
    
    <!-- Layer 7 -->
    <rect x="0" y="75" width="300" height="40" rx="8" fill="#334155" opacity="0.6"/>
    <text x="150" y="100" fill="#94a3b8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13">
      Layer 7: Application (HTTP)
    </text>
    
    <!-- Layers 1-6 -->
    <rect x="0" y="130" width="300" height="35" rx="8" fill="#1e293b" opacity="0.5"/>
    <text x="150" y="152" fill="#64748b" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">
      Layers 1-6: Transport, Network...
    </text>
    
    <!-- Arrow pointing up -->
    <path d="M 150 -20 L 140 0 L 145 0 L 145 -15 L 155 -15 L 155 0 L 160 0 Z" fill="#6366f1" opacity="0.7"/>
  </g>
  
  <!-- Main Title -->
  <g transform="translate(480, 100)">
    <!-- KCP Letters -->
    <text x="0" y="60" fill="white" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
      KCP
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="100" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400">
      Knowledge Context Protocol
    </text>
    
    <!-- Tagline -->
    <text x="0" y="140" fill="#6366f1" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">
      The missing layer for AI-generated knowledge
    </text>
  </g>
  
  <!-- AI Agent Icons -->
  <g transform="translate(480, 220)">
    <!-- Claude -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="110" height="90" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
      <text x="55" y="45" fill="white" text-anchor="middle" font-size="28">🤖</text>
      <text x="55" y="72" fill="#94a3b8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">Claude</text>
    </g>
    
    <!-- ChatGPT -->
    <g transform="translate(130, 0)">
      <rect x="0" y="0" width="110" height="90" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
      <text x="55" y="45" fill="white" text-anchor="middle" font-size="28">🧠</text>
      <text x="55" y="72" fill="#94a3b8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">ChatGPT</text>
    </g>
    
    <!-- Copilot -->
    <g transform="translate(260, 0)">
      <rect x="0" y="0" width="110" height="90" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <text x="55" y="45" fill="white" text-anchor="middle" font-size="28">✨</text>
      <text x="55" y="72" fill="#94a3b8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">Copilot</text>
    </g>
    
    <!-- Custom Agent -->
    <g transform="translate(390, 0)">
      <rect x="0" y="0" width="110" height="90" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
      <text x="55" y="45" fill="white" text-anchor="middle" font-size="28">🔧</text>
      <text x="55" y="72" fill="#94a3b8" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">Your Agent</text>
    </g>
    
    <!-- Connection lines to Layer 8 -->
    <g stroke="#6366f1" stroke-width="2" stroke-dasharray="5,5" opacity="0.5">
      <line x1="55" y1="90" x2="-150" y2="60"/>
      <line x1="185" y1="90" x2="-50" y2="60"/>
      <line x1="315" y1="90" x2="50" y2="60"/>
      <line x1="445" y1="90" x2="150" y2="60"/>
    </g>
  </g>
  
  <!-- Features -->
  <g transform="translate(480, 360)">
    <!-- Feature badges -->
    <g font-family="Inter, system-ui, sans-serif" font-size="13">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#22c55e" fill-opacity="0.15"/>
      <text x="60" y="21" fill="#22c55e" text-anchor="middle" font-weight="500">✓ Persist</text>
      
      <rect x="135" y="0" width="120" height="32" rx="16" fill="#6366f1" fill-opacity="0.15"/>
      <text x="195" y="21" fill="#6366f1" text-anchor="middle" font-weight="500">🔍 Discover</text>
      
      <rect x="270" y="0" width="120" height="32" rx="16" fill="#f59e0b" fill-opacity="0.15"/>
      <text x="330" y="21" fill="#f59e0b" text-anchor="middle" font-weight="500">🔗 Trace</text>
      
      <rect x="405" y="0" width="120" height="32" rx="16" fill="#ec4899" fill-opacity="0.15"/>
      <text x="465" y="21" fill="#ec4899" text-anchor="middle" font-weight="500">🔐 Verify</text>
    </g>
  </g>
  
  <!-- Stats -->
  <g transform="translate(480, 430)">
    <g font-family="Inter, system-ui, sans-serif">
      <text x="0" y="0" fill="#64748b" font-size="12">PRODUCTION READY</text>
      
      <text x="0" y="35" fill="white" font-size="20" font-weight="600">227</text>
      <text x="45" y="35" fill="#64748b" font-size="14">tests</text>
      
      <text x="110" y="35" fill="white" font-size="20" font-weight="600">8</text>
      <text x="130" y="35" fill="#64748b" font-size="14">live peers</text>
      
      <text x="220" y="35" fill="white" font-size="20" font-weight="600">~8K</text>
      <text x="270" y="35" fill="#64748b" font-size="14">artifacts</text>
      
      <text x="360" y="35" fill="white" font-size="20" font-weight="600">3</text>
      <text x="380" y="35" fill="#64748b" font-size="14">SDKs</text>
    </g>
  </g>
  
  <!-- Bottom Bar -->
  <rect x="0" y="520" width="1200" height="107" fill="#0f172a" opacity="0.8"/>
  
  <!-- GitHub Link -->
  <g transform="translate(480, 555)">
    <rect x="0" y="0" width="280" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="24" y="28" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="14">⭐</text>
    <text x="50" y="28" fill="white" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">github.com/kcp-protocol/kcp</text>
  </g>
  
  <!-- Open Source Badge -->
  <g transform="translate(780, 555)">
    <rect x="0" y="0" width="140" height="44" rx="8" fill="#22c55e" fill-opacity="0.15"/>
    <text x="70" y="28" fill="#22c55e" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">MIT License</text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.3">
    <!-- Floating particles -->
    <circle cx="200" cy="500" r="3" fill="#6366f1"/>
    <circle cx="350" cy="450" r="2" fill="#8b5cf6"/>
    <circle cx="1050" cy="150" r="4" fill="#6366f1"/>
    <circle cx="1100" cy="200" r="2" fill="#22c55e"/>
    <circle cx="950" cy="400" r="3" fill="#f59e0b"/>
  </g>
</svg>
